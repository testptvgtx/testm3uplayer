<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>M3U8 Web Player & Uploader</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        video { width: 100%; background: #000; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>ระบบเล่นและอัปโหลดไฟล์ M3U</h2>

    <!-- ส่วนที่ 1: ฟอร์มสำหรับให้ผู้ใช้อัปโหลดไฟล์ -->
    <div class="box">
        <h3>1. นำเข้าไฟล์ Playlist (.m3u)</h3>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="fileInput" name="playlist" accept=".m3u" required>
            <button type="submit">ส่งไฟล์เข้าฐานข้อมูล</button>
        </form>
        <p id="uploadStatus"></p>
    </div>

    <!-- ส่วนที่ 2: เครื่องเล่นวิดีโอ -->
    <div class="box">
        <h3>2. เครื่องเล่นวิดีโอ M3U8</h3>
        <video id="video" controls></video>
    </div>

    <script>
        // โค้ดสำหรับส่งไฟล์ไปหลังบ้าน (Backend) ด้วย AJAX
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const statusText = document.getElementById('uploadStatus');
            
            const formData = new FormData();
            formData.append('playlist', fileInput.files[0]);

            statusText.innerText = "กำลังอัปโหลด...";

            try {
                const response = await fetch('/api/upload-playlist', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if(response.ok) {
                    statusText.innerHTML = `✅ ${result.message} <br> ชื่อนามแฝงไฟล์ในระบบ: <b>${result.fileId}</b>`;
                } else {
                    statusText.innerText = `❌ เกิดข้อผิดพลาด: ${result.error}`;
                }
            } catch (error) {
                statusText.innerText = "❌ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้";
            }
        });

        // โค้ดเล่นวิดีโอ (ตัวอย่างลิงก์สตรีมทดสอบ)
        const video = document.getElementById('video');
        const videoSrc = 'https://mux.dev'; 

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
